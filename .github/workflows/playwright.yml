name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chromium'
        type: choice
        options:
          - chromium
          - firefox
          - webkit
jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      BROWSER: ${{ github.event.inputs.browser || 'chromium' }}
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Ensure browsers are installed
      run: python -m playwright install --with-deps ${{ env.BROWSER }}
    - name: Run your tests
      run: pytest -vv --browser ${{ env.BROWSER }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-report-${{ env.BROWSER }}
        path: allure-results
